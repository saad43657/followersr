<!DOCTYPE html>
<html>
<head>
  <title>Java Offline AI</title>

  <style>
    body {
      background: radial-gradient(circle, #000, #001a1a);
      color: #00ffcc;
      font-family: Arial;
      text-align: center;
      padding-top: 50px;
    }

    #orb {
      width: 140px;
      height: 140px;
      margin: 20px auto;
      border-radius: 50%;
      background: radial-gradient(circle, #00ffcc, #001);
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 25px #00ffcc;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      background: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #chat {
      max-width: 600px;
      margin: auto;
      text-align: left;
      padding: 20px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h1>🤖 Java Offline AI</h1>
<div id="orb"></div>

<button onclick="startAI()">🎤 Start Listening</button>

<div id="chat"></div>

<script>
const chat = document.getElementById("chat");

// 🧠 show text
function add(text){
  chat.innerHTML += text + "<br><br>";
}

// 🔊 speak
function speak(text){
  let s = new SpeechSynthesisUtterance(text);
  s.lang = "en-US";
  speechSynthesis.speak(s);
}

// 🤖 OFFLINE BRAIN (RULE BASED AI)
function brain(text){

  text = text.toLowerCase();

  if(text.includes("hello") || text.includes("hi")){
    return "Hello! I am Java, your offline assistant.";
  }

  if(text.includes("your name")){
    return "My name is Java AI.";
  }

  if(text.includes("time")){
    return "Current time is " + new Date().toLocaleTimeString();
  }

  if(text.includes("date")){
    return "Today is " + new Date().toDateString();
  }

  if(text.includes("how are you")){
    return "I am fine. Thank you for asking.";
  }

  if(text.includes("open youtube")){
    window.open("https://youtube.com");
    return "Opening YouTube";
  }

  if(text.includes("open google")){
    window.open("https://google.com");
    return "Opening Google";
  }

  if(text.includes("who made you")){
    return "I was created by a developer as an offline Java AI.";
  }

  // default fallback
  return "Sorry, I don't understand that yet.";
}

// 🎤 VOICE SYSTEM
function startAI(){

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Speech Recognition not supported");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.continuous = true;

  rec.onstart = ()=> add("🎤 Listening started...");

  rec.onresult = (e)=>{

    let text = e.results[e.results.length-1][0].transcript;

    add("👤 You: " + text);

    if(!text.toLowerCase().includes("java")) return;

    text = text.toLowerCase().replace("java","").trim();

    let reply = brain(text);

    add("🤖 Java: " + reply);
    speak(reply);
  };

  rec.onend = ()=> rec.start();
  rec.start();
}
</script>

</body>
</html>
